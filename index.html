<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoonZu // YoRHa Craft System</title>
<script src="craftingData.js"></script>
<style>
/* ── NieR: Automata theme ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #080807;
  --bg2:     #0c0c0a;
  --bg3:     #101010;
  --bg4:     #141412;
  --border:  rgba(208,200,182,0.11);
  --border2: rgba(208,200,182,0.30);
  --text:    #cdc8b6;
  --muted:   #6e6960;
  --faint:   #423e38;
  /* status colors */
  --green:   #a8a498;   /* "ok" = dim white */
  --yellow:  #a48018;   /* warn = amber */
  --red:     #b01828;   /* bad / primary accent */
  /* alias to existing var names used in JS-generated HTML */
  --purple:  #b01828;
  --purple2: #7a1020;
  --purple3: rgba(176,24,40,0.15);
  --blue:    #cdc8b6;
  --gold:    #a48018;
  --white:   #c8c3b0;
  --connector: rgba(176,24,40,0.5);
}

html { font-size: 14px; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'Courier New', Courier, monospace;
  min-height: 100vh;
  /* subtle dot-grid background */
  background-image: radial-gradient(circle, rgba(208,200,182,0.035) 1px, transparent 1px);
  background-size: 26px 26px;
}

/* scanlines overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.055) 3px, rgba(0,0,0,0.055) 4px
  );
  pointer-events: none; z-index: 9000;
}

/* ── Header ─────────────────────────────────────────────────────────────────── */
.header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border2);
  padding: 10px 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--red), transparent 60%);
}
.header h1 {
  color: var(--text); font-size: .78rem; font-weight: normal;
  text-transform: uppercase; letter-spacing: .22em;
}
.header h1::before { content: '// '; color: var(--red); }
.header-right { display: flex; gap: 10px; align-items: center; }

main { padding: 20px 28px 80px; }

/* ── Cards ──────────────────────────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 2px solid var(--purple2);
  padding: 16px 20px;
  margin-bottom: 10px;
  position: relative;
  clip-path: polygon(
    0 0, calc(100% - 14px) 0,
    100% 14px, 100% 100%,
    14px 100%, 0 calc(100% - 14px)
  );
}
.card::after {
  content: '';
  position: absolute;
  top: -1px; right: -1px;
  width: 15px; height: 15px;
  background: linear-gradient(135deg, transparent 50%, var(--red) 50%);
  opacity: .25;
}

.card-title {
  font-size: .54rem; color: var(--red);
  text-transform: uppercase; letter-spacing: .18em;
  margin-bottom: 14px; padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
}
.card-title::before { content: '▸ '; opacity: .7; }

/* ── Controls ───────────────────────────────────────────────────────────────── */
.controls { display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-end; }

label {
  display: block; font-size: .54rem; color: var(--muted);
  margin-bottom: 7px; text-transform: uppercase; letter-spacing: .14em;
}

select, input[type=number] {
  background: transparent; border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--text); padding: 5px 4px;
  font-family: inherit; font-size: .88rem; border-radius: 0;
}
select:focus, input[type=number]:focus { outline: none; border-bottom-color: var(--white); }
select { min-width: 220px; max-width: 340px; }
input[type=number] { width: 80px; }
option, optgroup { background: #0d0d0b; }

/* ── Buttons ────────────────────────────────────────────────────────────────── */
.btn {
  background: var(--purple2); color: var(--text);
  border: 1px solid var(--red);
  padding: 6px 16px; border-radius: 0; cursor: pointer;
  font-family: inherit; font-size: .68rem;
  text-transform: uppercase; letter-spacing: .12em;
  transition: background .12s, color .12s;
}
.btn:hover { background: var(--red); color: var(--white); }
.btn-outline {
  background: transparent; border: 1px solid var(--border2); color: var(--muted);
}
.btn-outline:hover { background: rgba(208,200,182,0.06); border-color: var(--text); color: var(--text); }
.btn-sm { padding: 4px 11px; font-size: .62rem; }

/* ── Summary ────────────────────────────────────────────────────────────────── */
.summary { display: flex; gap: 44px; flex-wrap: wrap; align-items: flex-start; }
.s-item .val {
  font-size: 2.4rem; color: var(--white);
  font-weight: normal; letter-spacing: .04em; line-height: 1;
}
.s-item .lbl {
  font-size: .5rem; color: var(--faint);
  text-transform: uppercase; letter-spacing: .18em; margin-top: 5px;
}

/* ── Chain cards ────────────────────────────────────────────────────────────── */
.chain-row {
  display: flex; align-items: flex-start; gap: 0;
  overflow-x: auto; padding-bottom: 4px;
  counter-reset: chain;
}
.chain-sep {
  color: var(--faint); font-size: .75rem; align-self: center;
  padding: 0 8px; flex-shrink: 0; letter-spacing: .1em;
}
.wc {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 0;
  padding: 10px 12px; min-width: 150px; max-width: 190px;
  flex-shrink: 0; display: flex; flex-direction: column; gap: 6px;
  position: relative;
  clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  counter-increment: chain;
}
.wc::before {
  content: counter(chain, decimal-leading-zero);
  position: absolute; top: 5px; right: 8px;
  font-size: .5rem; color: var(--faint); letter-spacing: .06em;
}
.wc.target {
  border-color: rgba(176,24,40,0.6);
  background: rgba(176,24,40,0.08);
}
.wc-badge {
  font-size: .5rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--faint); background: transparent; border: none; padding: 0;
}
.wc.target .wc-badge { color: var(--red); }
.wc-name { font-size: .78rem; color: var(--white); font-weight: normal; line-height: 1.35; }
.wc.target .wc-name { color: var(--white); }
.wc-stats { font-size: .7rem; color: var(--muted); line-height: 1.85; }
.wc-stats .v { color: var(--text); }
.wc-toggle {
  font-size: .6rem; color: var(--faint); cursor: pointer;
  background: none; border: none; border-bottom: 1px solid transparent;
  font-family: inherit; padding: 0; text-align: left; letter-spacing: .06em;
  transition: color .1s;
}
.wc-toggle:hover { color: var(--text); border-bottom-color: var(--border2); }
.wc-mat-list { display: none; font-size: .66rem; margin-top: 2px; }
.wc-mat-list.open { display: block; }
.wc-mat-list dl { display: grid; grid-template-columns: 1fr auto; gap: 2px 6px; }
.wc-mat-list dt { color: var(--muted); }
.wc-mat-list dd { text-align: right; white-space: nowrap; }

/* ── Material tables (Grand Total) ──────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; }
th {
  font-size: .52rem; color: var(--faint); text-align: left;
  padding: 4px 8px; border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: .14em;
}
td { padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: .82rem; }
tr:last-child td { border-bottom: none; }
.sec-label {
  font-size: .52rem; color: var(--faint); text-transform: uppercase;
  letter-spacing: .14em; padding: 9px 8px 4px; border-top: 1px solid var(--border);
}
.sec-label:first-child { border-top: none; padding-top: 0; }

/* tags */
.tag {
  display: inline-block; font-size: .5rem; padding: 0 5px;
  border-radius: 0; margin-left: 5px; vertical-align: middle; letter-spacing: .08em;
}
.tag-c { background: var(--purple3); color: var(--red); border: 1px solid var(--purple2); }

/* sub-rows toggle */
.mat-toggle { cursor: pointer; color: var(--muted); font-size: .64rem; margin-left: 6px; transition: color .1s; }
.mat-toggle:hover { color: var(--text); }
.sub-rows { display: none; }
.sub-rows.open { display: table-row-group; }
.sub-row td { background: var(--bg4); color: var(--muted); font-size: .74rem; padding: 4px 8px 4px 24px; border-bottom: 1px solid var(--border); }

/* ── Progress bars — NieR: thin 2px lines ───────────────────────────────────── */
.bar-wrap {
  background: rgba(208,200,182,0.08);
  border-radius: 0; height: 2px; width: 72px;
  overflow: hidden; display: inline-block; vertical-align: middle;
  flex-shrink: 0;
}
.bar { height: 100%; border-radius: 0; transition: width .3s; }
.bar.ok   { background: var(--white); }
.bar.warn { background: var(--gold); }
.bar.bad  { background: var(--red); }
.pct { font-size: .68rem; margin-left: 2px; flex-shrink: 0; width: 34px; text-align: right; }
.ok   { color: var(--white); }
.warn { color: var(--gold); }
.bad  { color: var(--red); }

/* qty inputs — underline-only style */
.mat-qty-input {
  background: transparent; border: none;
  border-bottom: 1px solid var(--border2);
  color: var(--text); padding: 1px 4px; border-radius: 0;
  font-family: inherit; font-size: .78rem;
  width: 68px; text-align: right; flex-shrink: 0;
  transition: border-color .1s;
}
.mat-qty-input:focus { outline: none; border-bottom-color: var(--white); }

/* ── Material Columns ───────────────────────────────────────────────────────── */
.mc-header {
  display: flex; align-items: center; gap: 10px;
  background: transparent;
  border: 1px solid rgba(176,24,40,0.35);
  border-left: 3px solid var(--red);
  border-radius: 0; padding: 8px 14px; margin-bottom: 14px;
}
.mc-header .titem-name {
  color: var(--white); font-weight: normal;
  font-size: .88rem; flex: 1; letter-spacing: .07em;
}
.mc-header .titem-qty  { color: var(--red); font-size: .8rem; }
.mc-header span:first-child { color: var(--red) !important; }

.mc-columns {
  display: flex; flex-direction: row; align-items: flex-start;
  overflow-x: auto; gap: 0; position: relative;
}

.mc-col { flex-shrink: 0; }
.mc-col-main {
  min-width: 440px; padding-right: 2px;
  border-right: 1px solid var(--border2);
}
.mc-col-sub {
  min-width: 300px; padding-left: 14px;
  border-right: 1px solid var(--border);
}
.mc-col-sub:last-child { border-right: none; }

.mc-group { margin-bottom: 10px; }
.mc-group-label {
  font-size: .5rem; color: var(--red); letter-spacing: .12em;
  text-transform: uppercase; padding: 2px 0 4px 8px; margin-bottom: 4px;
  border-left: 2px solid var(--purple2);
}

.mc-row { margin-bottom: 3px; }

.mc-node {
  display: flex; align-items: center; gap: 6px; flex-wrap: nowrap;
  background: var(--bg3); border-radius: 0;
  padding: 5px 10px; width: 100%;
  border-left: 2px solid var(--border2);
  border-bottom: 1px solid var(--border);
}
.mc-node.ok   { border-left-color: var(--white); }
.mc-node.warn { border-left-color: var(--gold); }
.mc-node.bad  { border-left-color: var(--red); }
.mc-node .mc-name { flex: 1; font-size: .8rem; min-width: 0; }
.mc-node .mc-need { color: var(--muted); font-size: .7rem; white-space: nowrap; flex-shrink: 0; width: 52px; text-align: right; }
.mc-status { flex-shrink: 0; width: 42px; text-align: right; }
.mc-arr { color: var(--faint); font-size: .72rem; }

.mc-col-sub .mc-node { background: var(--bg4); padding: 4px 9px; }
.mc-col-sub .mc-node .mc-name { font-size: .76rem; color: var(--muted); }

#grandCard { border-left-color: var(--purple2); }
#grandCard .card-title { color: var(--red); }

.hidden { display: none !important; }

/* ── Inventory Panel ─────────────────────────────────────────────────────────── */
.inv-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; justify-content: flex-end;
}
.inv-overlay.hidden { display: none !important; }
.inv-backdrop { flex: 1; background: rgba(0,0,0,.7); }
.inv-panel {
  width: 320px; max-width: 95vw; background: var(--bg2);
  border-left: 1px solid var(--border2); display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.inv-header {
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.inv-header h2 {
  font-size: .68rem; color: var(--red);
  text-transform: uppercase; letter-spacing: .16em; font-weight: normal;
}
.inv-toolbar {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
}
.inv-search {
  background: transparent; border: none;
  border-bottom: 1px solid var(--border2); color: var(--text);
  padding: 5px 4px; border-radius: 0; font-family: inherit; font-size: .8rem; width: 100%;
}
.inv-search:focus { outline: none; border-bottom-color: var(--white); }
.inv-toolbar-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.inv-list { flex: 1; overflow-y: auto; padding: 4px 0; }
.inv-group-label {
  font-size: .5rem; color: var(--faint); text-transform: uppercase;
  letter-spacing: .14em; padding: 8px 16px 3px;
}
.inv-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 16px; gap: 10px; transition: background .1s;
}
.inv-row.relevant { background: rgba(176,24,40,0.07); }
.inv-row:hover { background: rgba(208,200,182,0.04); }
.inv-name { font-size: .76rem; flex: 1; color: var(--muted); }
.inv-name.relevant { color: var(--text); }
.inv-qty {
  background: transparent; border: none; border-bottom: 1px solid var(--border2);
  color: var(--text); padding: 2px 4px; border-radius: 0;
  font-family: inherit; font-size: .76rem; width: 64px; text-align: right;
}
.inv-footer {
  padding: 8px 16px; border-top: 1px solid var(--border);
  font-size: .58rem; color: var(--faint); flex-shrink: 0; letter-spacing: .06em;
}

/* ── Import/Export modal ─────────────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.82);
  z-index: 300; display: flex; align-items: center; justify-content: center;
}
.modal-bg.hidden { display: none !important; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-left: 3px solid var(--red); border-radius: 0;
  padding: 20px; width: 440px; max-width: 95vw;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
}
.modal h3 {
  color: var(--red); font-size: .68rem;
  text-transform: uppercase; letter-spacing: .16em;
  margin-bottom: 12px; font-weight: normal;
}
.modal h3::before { content: '▸ '; }
.modal textarea {
  width: 100%; height: 180px; background: var(--bg4);
  border: 1px solid var(--border); border-bottom: 2px solid var(--border2);
  color: var(--text); padding: 10px; border-radius: 0;
  font-family: monospace; font-size: .76rem; resize: vertical;
}
.modal-btns { display: flex; gap: 10px; margin-top: 12px; justify-content: flex-end; }

/* ── Scrollbar styling ───────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── THEME: YoRHa (cream / light) ──────────────────────────────────────────── */
[data-theme="yorha"] {
  --bg:      #d1cdb7;
  --bg2:     #c8c4ae;
  --bg3:     #dcd8c0;
  --bg4:     #e8e4cc;
  --border:  rgba(69,65,56,0.13);
  --border2: rgba(69,65,56,0.38);
  --text:    #454138;
  --muted:   #7a7568;
  --faint:   #aca79a;
  --green:   #3d5e3b;
  --yellow:  #8a5010;
  --red:     #8a1018;
  --purple:  #8a1018;
  --purple2: #6a0c14;
  --purple3: rgba(138,16,24,0.08);
  --blue:    #454138;
  --gold:    #8a5010;
  --white:   #1e1c18;
  --connector: rgba(138,16,24,0.4);
}

[data-theme="yorha"] body {
  font-family: helvetica, 'Helvetica Neue', sans-serif;
  font-weight: 300;
  letter-spacing: 0.03em;
  background-image:
    linear-gradient(to right, rgba(180,175,155,0.55) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(180,175,155,0.55) 1px, transparent 1px);
  background-size: 14px 14px;
}

[data-theme="yorha"] body::after { display: none; }

[data-theme="yorha"] option,
[data-theme="yorha"] optgroup { background: #dcd8c0; }

[data-theme="yorha"] .bar-wrap { background: rgba(69,65,56,0.10); }
[data-theme="yorha"] .inv-row.relevant { background: rgba(138,16,24,0.05); }
[data-theme="yorha"] .inv-row:hover    { background: rgba(69,65,56,0.05); }
[data-theme="yorha"] .wc.target { background: rgba(138,16,24,0.06); border-color: rgba(138,16,24,0.45); }
[data-theme="yorha"] .btn-outline:hover { background: rgba(69,65,56,0.07); }
[data-theme="yorha"] .inv-backdrop { background: rgba(69,65,56,0.40); }
[data-theme="yorha"] .modal-bg    { background: rgba(69,65,56,0.60); }
[data-theme="yorha"] .mc-header   { border-color: rgba(138,16,24,0.25); }
[data-theme="yorha"] .modal textarea { background: var(--bg3); border-color: var(--border); }

/* ── Theme switcher ─────────────────────────────────────────────────────────── */
.theme-switcher { display: flex; gap: 3px; align-items: center; }
.theme-btn {
  background: transparent; border: 1px solid var(--border2);
  color: var(--muted); padding: 3px 10px; cursor: pointer;
  font-family: inherit; font-size: .56rem;
  text-transform: uppercase; letter-spacing: .14em;
  border-radius: 0; transition: all .12s;
}
.theme-btn.active { background: var(--purple2); color: var(--text); border-color: var(--red); }
.theme-btn:hover:not(.active) { color: var(--text); border-color: var(--text); }

/* ── Plans Panel ─────────────────────────────────────────────────────────────── */
.plans-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: flex; justify-content: flex-start;
}
.plans-overlay.hidden { display: none !important; }
.plans-backdrop { flex: 1; background: rgba(0,0,0,.7); }
.plans-panel {
  width: 300px; max-width: 95vw; background: var(--bg2);
  border-right: 1px solid var(--border2); display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}
.plans-header {
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.plans-header h2 {
  font-size: .68rem; color: var(--red);
  text-transform: uppercase; letter-spacing: .16em; font-weight: normal;
}
.plans-toolbar {
  padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.plans-list { flex: 1; overflow-y: auto; }
.plans-empty {
  padding: 20px 16px; color: var(--faint); font-size: .76rem; line-height: 1.7;
  text-align: center;
}
.plan-item {
  display: flex; align-items: center; padding: 10px 16px; gap: 10px;
  border-bottom: 1px solid var(--border);
  transition: background .1s; border-left: 2px solid transparent;
}
.plan-item:hover { background: rgba(208,200,182,0.04); }
.plan-item.active {
  background: var(--purple3); border-left-color: var(--red);
}
.plan-info { flex: 1; min-width: 0; cursor: pointer; }
.plan-name {
  font-size: .8rem; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.plan-item.active .plan-name { color: var(--white); }
.plan-meta { font-size: .56rem; color: var(--faint); margin-top: 3px; letter-spacing: .04em; }
.plan-del {
  background: none; border: none; color: var(--faint); cursor: pointer;
  font-size: .72rem; padding: 3px 5px; flex-shrink: 0; border-radius: 0;
  font-family: inherit; transition: color .1s;
}
.plan-del:hover { color: var(--red); }
.plans-count {
  padding: 6px 16px 6px; font-size: .52rem; color: var(--faint);
  letter-spacing: .08em; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.plan-new-form {
  padding: 10px 16px 12px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
  background: var(--purple3);
}
.plan-form-label {
  font-size: .5rem; color: var(--red); text-transform: uppercase; letter-spacing: .14em;
}
.plan-name-input {
  background: transparent; border: none; border-bottom: 1px solid var(--border2);
  color: var(--text); padding: 4px 2px; font-family: inherit; font-size: .82rem;
  width: 100%; border-radius: 0;
}
.plan-name-input:focus { outline: none; border-bottom-color: var(--white); }
.plan-form-btns { display: flex; gap: 6px; }
.plan-edit {
  background: none; border: none; color: var(--faint); cursor: pointer;
  font-size: .72rem; padding: 3px 5px; flex-shrink: 0; border-radius: 0;
  font-family: inherit; transition: color .1s;
}

<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header class="header">

    <button class="btn btn-outline" onclick="openInv()">Inventory</button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main>

  <!-- Controls -->
  <div class="card">
    <div class="controls">
      <div>
        <label>Unit Type</label>
        <select id="categorySelect" onchange="onCategoryChange()">
          <option value="all">All Types</option>

      </div>

        <label>Target Unit</label>

        <label>Quantity</label>
        <input type="number" id="qty" value="1" min="1" max="99999" oninput="recalc()">
      </div>
      <div style="align-self:flex-end">
        <button class="btn btn-sm" id="savePlanBtn" onclick="savePlan()">+ Save Plan</button>
      </div>
    </div>
  </div>

  <!-- Summary -->
  <div class="card hidden" id="summaryCard">
    <div class="card-title">Status Report</div>
    <div class="summary">

      <div class="s-item"><div class="val" id="sPct">—</div><div class="lbl">Overall progress</div></div>

  <!-- Grand total -->

    <table><thead><tr><th>Material</th><th>Total Need</th><th>Have</th><th>Missing</th><th>Progress</th></tr></thead>
    <tbody id="grandBody"></tbody></table>

</main>

<!-- ── Plans panel ──────────────────────────────────────────────────────────── -->
<div class="plans-overlay hidden" id="plansOverlay">
  <div class="plans-panel">

  "Comet Belt (60)":             ["Heavy Metal Belt (35)", "Sturdy Metal Belt (45)"],
  "Frozen Belt (75)":            ["Heavy Metal Belt (35)", "Sturdy Metal Belt (45)", "Comet Belt (60)"],
  "Black Shoes (45)":            ["Rapid Shoes (35)"],
  "Red Shoes (60)":              ["Rapid Shoes (35)", "Black Shoes (45)"],
  "Frozen Shoes (75)":           ["Rapid Shoes (35)", "Black Shoes (45)", "Red Shoes (60)"],
  "Green Shoes (45)":            ["Glass Shoes (35)"],
  "Brown Shoes (60)":            ["Glass Shoes (35)", "Green Shoes (45)"],
  "Flame Shoes (85)":            ["Glass Shoes (35)", "Green Shoes (45)", "Brown Shoes (60)"],
  "Archangel's Wing": ["Angel Wings"],
  "Satan's Wing":     ["Devil Wings"],

const ALL_RECIPES = {};
for (const [cat, items] of Object.entries(craftingData)) {
  for (const [name, recipe] of Object.entries(items)) ALL_RECIPES[name] = recipe;
}
const CRAFTABLE = craftingData.materials || {};
const ALL_MATS = (() => {
  const s = new Set();
  for (const r of Object.values(ALL_RECIPES)) for (const m of Object.keys(r)) s.add(m);
  return [...s].sort((a, b) => a.localeCompare(b));
})();

// ── Inventory ─────────────────────────────────────────────────────────────────
let INV = {};
function loadInv() { try { INV = JSON.parse(localStorage.getItem('gz_inv') || '{}'); } catch { INV = {}; } }
function saveInv() {
  localStorage.setItem('gz_inv', JSON.stringify(INV));
  localStorage.setItem('gz_inv_ts', new Date().toLocaleString());
  updateInvCount();
}
function getQ(mat) { return INV[mat] || 0; }
function setQ(mat, qty) { if (qty > 0) INV[mat] = qty; else delete INV[mat]; saveInv(); recalc(); }
function updateInvCount() {
  const n = Object.keys(INV).length;
  document.getElementById('invCount').textContent = n ? `[${n} units tracked]` : '';
}

// ── Item selectors ────────────────────────────────────────────────────────────
function buildSelector() {
  const catSelect = document.getElementById('categorySelect');
  const sortedCats = Object.keys(craftingData).sort((a, b) => (CATEGORY_LABELS[a]||a).localeCompare(CATEGORY_LABELS[b]||b));
  for (const cat of sortedCats) {
    const opt = document.createElement('option');
    opt.value = cat; opt.textContent = CATEGORY_LABELS[cat] || cat;
    catSelect.appendChild(opt);
  }
  populateItemSelect('all');
}
function itemLevel(name) { const m = name.match(/\((\d+)\)/); return m ? parseInt(m[1]) : 0; }
function sortByLevel(names) { return names.sort((a, b) => itemLevel(a) - itemLevel(b) || a.localeCompare(b)); }
function populateItemSelect(cat) {
  const sel = document.getElementById('itemSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— select item —</option>';
  if (cat === 'all') {
    const sortedCats = Object.keys(craftingData).sort((a, b) => (CATEGORY_LABELS[a]||a).localeCompare(CATEGORY_LABELS[b]||b));
    for (const c of sortedCats) {
      const group = document.createElement('optgroup');
      group.label = CATEGORY_LABELS[c] || c;
      for (const name of sortByLevel(Object.keys(craftingData[c]))) {
        const opt = document.createElement('option'); opt.value = name; opt.textContent = name;
        group.appendChild(opt);
      }
      sel.appendChild(group);
    }
  } else {
    for (const name of sortByLevel(Object.keys(craftingData[cat] || {}))) {
      const opt = document.createElement('option'); opt.value = name; opt.textContent = name;
      sel.appendChild(opt);
    }
  }
  if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
}
function onCategoryChange() { populateItemSelect(document.getElementById('categorySelect').value); recalc(); }
function onItemChange() { recalc(); }

// ── Helpers ───────────────────────────────────────────────────────────────────
function flattenRaw(recipe, mult = 1) {
  const raw = {};
  for (const [mat, qty] of Object.entries(recipe)) {
    const need = qty * mult;
    if (CRAFTABLE[mat]) {
      const tocraft = Math.max(0, need - getQ(mat));
      if (tocraft > 0) {
        const sub = flattenRaw(CRAFTABLE[mat], tocraft);
        for (const [r, q] of Object.entries(sub)) raw[r] = (raw[r] || 0) + q;
      }
    } else {
      raw[mat] = (raw[mat] || 0) + need;
    }
  }
  return raw;
}
function barHtml(pct) {
  const cls = pct >= 100 ? 'ok' : pct >= 50 ? 'warn' : 'bad';
  return `<div class="bar-wrap"><div class="bar ${cls}" style="width:${Math.min(100,pct).toFixed(1)}%"></div></div>`
       + `<span class="pct ${cls}">${pct.toFixed(0)}%</span>`;
}
function missHtml(miss) {
  return miss > 0 ? `<span class="bad">-${miss.toLocaleString()}</span>` : `<span class="ok">✓</span>`;
}
function qtyInput(mat, val) {
  const k = mat.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  return `<input class="mat-qty-input" type="number" min="0" value="${val || ''}" placeholder="0"
    onchange="setQ('${k}', parseInt(this.value)||0)" onclick="this.select()">`;
}
function matRowHtml(mat, need, have, sub) {
  const miss = Math.max(0, need - have);
  const pct  = need > 0 ? Math.min(100, have / need * 100) : 100;
  const isc  = !!sub;
  const tag  = isc ? `<span class="tag tag-c">craft</span>` : '';
  const tog  = isc ? `<span class="mat-toggle" onclick="toggleSub(this)">▲ ingredients</span>` : '';
  let subHtml = '';
  if (isc) {
    for (const [sm, sp] of Object.entries(sub)) {
      const sn = sp * miss, sh = getQ(sm), smiss = Math.max(0, sn - sh);
      subHtml += `<tr class="sub-row"><td>${sm}</td><td>${sn.toLocaleString()}</td><td>${qtyInput(sm, sh)}</td><td>${missHtml(smiss)}</td><td>${barHtml(sn>0?Math.min(100,sh/sn*100):100)}</td></tr>`;
    }
  }
  return `<tr><td>${mat}${tag}${tog}</td><td>${need.toLocaleString()}</td><td>${qtyInput(mat, have)}</td><td>${missHtml(miss)}</td><td>${barHtml(pct)}</td></tr>`
    + (isc ? `<tr><td colspan="5" style="padding:0"><table style="width:100%"><tbody class="sub-rows open">${subHtml}</tbody></table></td></tr>` : '');
}
function toggleSub(el) {
  const sub = el.closest('tr').nextElementSibling?.querySelector('.sub-rows');
  if (!sub) return;
  sub.classList.toggle('open');
  el.textContent = sub.classList.contains('open') ? '▲ ingredients' : '▼ ingredients';
}
function toggleWcMat(btn, id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '▲ materials' : '▼ materials';
}

// ── Material Columns ──────────────────────────────────────────────────────────
function renderMatColumns(item, recipe, wantQty) {
  function buildTree(recipeMap, craftQty) {
    return Object.entries(recipeMap).map(([mat, qty]) => {
      const need = qty * craftQty, have = getQ(mat), miss = Math.max(0, need - have);
      const isCraft = !!CRAFTABLE[mat];
      const node = {mat, need, have, miss, isCraft, children: null};
      if (isCraft && miss > 0) node.children = buildTree(CRAFTABLE[mat], miss);
      return node;
    });
  }
  const tree = buildTree(recipe, wantQty);
  const columns = [{type: 'main', items: tree}];
  let current = tree;
  while (true) {
    const groups = [];
    for (const it of current) if (it.isCraft && it.children?.length) groups.push({parent: it.mat, items: it.children});
    if (!groups.length) break;
    columns.push({type: 'sub', groups});
    current = groups.flatMap(g => g.items);
  }
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
  function nodeHtml(it) {
    const pct = it.need > 0 ? Math.min(100, it.have / it.need * 100) : 100;
    const cls = pct >= 100 ? 'ok' : pct >= 50 ? 'warn' : 'bad';
    const k   = it.mat.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const tag = it.isCraft ? ' <span class="tag tag-c">craft</span>' : '';
    const arr = it.isCraft && it.children ? ' <span class="mc-arr">›</span>' : '';
    const da  = it.isCraft && it.children ? ` data-craft="${esc(it.mat)}"` : '';
    return `<div class="mc-node ${cls}"${da}>
      <span class="mc-name">${it.mat}${tag}${arr}</span>
      <span class="mc-need">×${it.need.toLocaleString()}</span>
      <input class="mat-qty-input" type="number" min="0"
        value="${it.have || ''}" placeholder="0"
        onchange="setQ('${k}', parseInt(this.value)||0)" onclick="this.select()">
      ${barHtml(pct)}
      ${it.miss > 0 ? `<span class="bad mc-status">-${it.miss.toLocaleString()}</span>` : `<span class="ok mc-status">✓</span>`}
    </div>`;
  }
  let colsHtml = '';
  for (let ci = 0; ci < columns.length; ci++) {
    const col = columns[ci];
    const colClass = ci === 0 ? 'mc-col-main' : 'mc-col-sub';
    let inner = '';
    if (col.type === 'main') {
      inner = col.items.map(it => `<div class="mc-row">${nodeHtml(it)}</div>`).join('');
    } else {
      inner = col.groups.map(g => `
        <div class="mc-group" data-parent="${esc(g.parent)}">
          <div class="mc-group-label">${g.parent}</div>
          ${g.items.map(it => `<div class="mc-row">${nodeHtml(it)}</div>`).join('')}
        </div>`).join('');
    }
    colsHtml += `<div class="mc-col ${colClass}">${inner}</div>`;
  }
  return `
    <div class="mc-header">
      <span style="color:var(--red)">▸</span>
      <span class="titem-name">${item}</span>
      <span class="titem-qty">×${wantQty}</span>
    </div>
    <div class="mc-columns">${colsHtml}</div>`;
}

// ── Column alignment ──────────────────────────────────────────────────────────
function alignColumns() {
  const cols = document.querySelector('.mc-columns');
  if (!cols) return;
  const colEls = Array.from(cols.querySelectorAll('.mc-col'));
  if (colEls.length <= 1) { requestAnimationFrame(drawConnectors); return; }
  colEls.forEach(col => col.querySelectorAll('.mc-group').forEach(g => { g.style.marginTop = ''; }));
  requestAnimationFrame(() => {
    for (let ci = 1; ci < colEls.length; ci++) {
      const col = colEls[ci], prevCol = colEls[ci - 1];
      const prevRect = prevCol.getBoundingClientRect(), colRect = col.getBoundingClientRect();
      const groups = Array.from(col.querySelectorAll('.mc-group'));
      const data = groups.map(grp => {
        const pname = grp.dataset.parent;
        let pNode = null;
        prevCol.querySelectorAll('.mc-node[data-craft]').forEach(n => { if (n.dataset.craft === pname) pNode = n; });
        const gr = grp.getBoundingClientRect(), pr = pNode?.getBoundingClientRect();
        return { grp, naturalTop: gr.top - colRect.top, height: gr.height,
                 pCenterY: pr ? pr.top + pr.height / 2 - prevRect.top : null };
      });
      const targets = []; let minBottom = 0;
      for (const d of data) {
        const desired = d.pCenterY !== null ? d.pCenterY - d.height / 2 : minBottom;
        const actual = Math.max(minBottom, Math.max(0, desired));
        targets.push(actual); minBottom = actual + d.height + 6;
      }
      let cumDisp = 0;
      for (let i = 0; i < data.length; i++) {
        const margin = targets[i] - data[i].naturalTop - cumDisp;
        if (margin > 0) { data[i].grp.style.marginTop = margin + 'px'; cumDisp += margin; }
      }
    }
    requestAnimationFrame(drawConnectors);
  });
}

// ── Column connectors (NieR-style: red dashed lines) ──────────────────────────
function drawConnectors() {
  const cols = document.querySelector('.mc-columns');
  if (!cols) return;
  cols.querySelector('svg.mc-connectors')?.remove();
  const craftNodes = Array.from(cols.querySelectorAll('.mc-node[data-craft]'));
  const groupEls   = Array.from(cols.querySelectorAll('.mc-group[data-parent]'));
  const pairs = [];
  for (const node of craftNodes) {
    const name = node.dataset.craft;
    const grp  = groupEls.find(g => g.dataset.parent === name);
    const label = grp?.querySelector('.mc-group-label');
    if (label) pairs.push({from: node, to: label});
  }
  if (!pairs.length) return;
  const w = cols.scrollWidth, h = cols.scrollHeight;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('mc-connectors');
  svg.setAttribute('width', w); svg.setAttribute('height', h);
  svg.style.cssText = 'position:absolute;left:0;top:0;pointer-events:none;overflow:visible';
  const cr = cols.getBoundingClientRect(), sl = cols.scrollLeft, st = cols.scrollTop;
  const connColor = getComputedStyle(document.documentElement).getPropertyValue('--connector').trim() || 'rgba(176,24,40,0.5)';
  for (const {from, to} of pairs) {
    const fr = from.getBoundingClientRect(), tr = to.getBoundingClientRect();
    const x1 = fr.right - cr.left + sl + 3, y1 = fr.top + fr.height / 2 - cr.top + st;
    const x2 = tr.left  - cr.left + sl - 3, y2 = tr.top + tr.height / 2 - cr.top + st;
    const mx = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1} ${y1} C${mx} ${y1},${mx} ${y2},${x2} ${y2}`);
    path.setAttribute('stroke', connColor);
    path.setAttribute('stroke-width', '1');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-dasharray', '4 3');
    svg.appendChild(path);
    const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    arrow.setAttribute('points', `${x2},${y2} ${x2-6},${y2-3} ${x2-6},${y2+3}`);
    arrow.setAttribute('fill', connColor);
    svg.appendChild(arrow);
  }
  cols.appendChild(svg);
}

// ── Recalculate ───────────────────────────────────────────────────────────────
let currentRelevantMats = new Set();
function recalc() {
  const item    = document.getElementById('itemSelect').value;
  const wantQty = Math.max(1, parseInt(document.getElementById('qty').value) || 1);
  const recipe  = ALL_RECIPES[item];
  if (!item || !recipe) {
    ['summaryCard','chainCard','matCard','grandCard'].forEach(id => document.getElementById(id).classList.add('hidden'));
    currentRelevantMats = new Set(); return;
  }
  document.getElementById('sLbl').textContent = item;
  const chain = CHAINS[item] || [], hasChain = chain.length > 0;
  currentRelevantMats = new Set();
  const collectMats = r => { for (const [m] of Object.entries(r)) { currentRelevantMats.add(m); if (CRAFTABLE[m]) collectMats(CRAFTABLE[m]); } };
  collectMats(recipe);
  for (const w of chain) if (ALL_RECIPES[w]) collectMats(ALL_RECIPES[w]);

  if (hasChain) {
    const row = document.getElementById('chainRow');
    row.innerHTML = '';
    [...chain, item].forEach((wname, idx) => {
      const isTarget = wname === item, wrec = ALL_RECIPES[wname]; if (!wrec) return;
      const need = wantQty, have = getQ(wname), miss = Math.max(0, need - have);
      const pct = Math.min(100, have / need * 100), uid = `wc${idx}`;
      if (idx > 0) row.insertAdjacentHTML('beforeend', `<div class="chain-sep">→</div>`);
      let matRows = '';
      for (const [m, p] of Object.entries(wrec)) {
        const mn = p * need, mh = getQ(m), mok = mh >= mn;
        matRows += `<dt>${m}</dt><dd class="${mok?'ok':'bad'}">${mh.toLocaleString()}/${mn.toLocaleString()}</dd>`;
      }
      row.insertAdjacentHTML('beforeend', `
        <div class="wc ${isTarget ? 'target' : ''}">
          <div><div class="wc-badge">${isTarget ? 'target' : 'upgrade'}</div>
          <div class="wc-name">${wname}</div></div>
          <div class="wc-stats">Need: <span class="v">${need}</span><br>Have: <span class="v">${have}</span><br>Missing: <span class="${miss>0?'bad':'ok'}">${miss>0?'-'+miss:'✓'}</span></div>
          <div>${barHtml(pct)}</div>
          <button class="wc-toggle" onclick="toggleWcMat(this,'${uid}')">▲ materials</button>
          <div class="wc-mat-list open" id="${uid}"><dl>${matRows}</dl></div>
        </div>`);
    });
    document.getElementById('chainCard').classList.remove('hidden');
  } else { document.getElementById('chainCard').classList.add('hidden'); }

  document.getElementById('matTree').innerHTML = renderMatColumns(item, recipe, wantQty);
  document.getElementById('matCard').classList.remove('hidden');
  requestAnimationFrame(alignColumns);

  let grand = flattenRaw(recipe, wantQty);
  if (hasChain) {
    for (const w of chain) {
      if (!ALL_RECIPES[w]) continue;
      const sub = flattenRaw(ALL_RECIPES[w], wantQty);
      for (const [m, q] of Object.entries(sub)) grand[m] = (grand[m] || 0) + q;
    }
    const gb = document.getElementById('grandBody');
    gb.innerHTML = '';
    for (const [m, n] of Object.entries(grand).sort((a,b) => b[1]-a[1])) {
      gb.insertAdjacentHTML('beforeend', matRowHtml(m, n, getQ(m), null));
    }
    document.getElementById('grandCard').classList.remove('hidden');
  } else { document.getElementById('grandCard').classList.add('hidden'); }

  const rawAll = hasChain ? grand : flattenRaw(recipe, wantQty);
  let minSets = Infinity, bottleneck = '', pcts = [];
  for (const [m, total] of Object.entries(rawAll)) {
    const h = getQ(m), perSet = total / wantQty;
    const sets = perSet > 0 ? Math.floor(h / perSet) : Infinity;
    pcts.push(Math.min(100, h / total * 100));
    if (sets < minSets) { minSets = sets; bottleneck = m; }
  }
  const avg = pcts.length ? pcts.reduce((a,b)=>a+b,0)/pcts.length : 0;
  document.getElementById('sCanCraft').textContent   = minSets === Infinity ? '—' : minSets.toLocaleString();
  document.getElementById('sPct').textContent        = avg.toFixed(0) + '%';
  document.getElementById('sBottleneck').textContent = bottleneck || '—';
  document.getElementById('summaryCard').classList.remove('hidden');
  if (!document.getElementById('invOverlay').classList.contains('hidden'))
    renderInvList(document.getElementById('invSearch').value);
}

// ── Inventory panel ───────────────────────────────────────────────────────────
function openInv()  { document.getElementById('invOverlay').classList.remove('hidden'); renderInvList(''); }
function closeInv() { document.getElementById('invOverlay').classList.add('hidden'); }
function renderInvList(search = '') {
  const q = search.toLowerCase(), list = document.getElementById('invList');
  list.innerHTML = '';
  const relevant = ALL_MATS.filter(m => currentRelevantMats.has(m) && m.toLowerCase().includes(q));
  const others   = ALL_MATS.filter(m => !currentRelevantMats.has(m) && m.toLowerCase().includes(q));
  function renderRow(mat, isRel) {
    const qty = getQ(mat);
    const div = document.createElement('div');
    div.className = 'inv-row' + (isRel ? ' relevant' : '');
    div.innerHTML = `<span class="inv-name${isRel?' relevant':''}">${mat}</span>
      <input class="inv-qty" type="number" min="0" value="${qty||''}" placeholder="0"
        onchange="setQ('${mat.replace(/'/g,"\\'")}', parseInt(this.value)||0)">`;
    list.appendChild(div);
  }
  if (relevant.length) {
    const lbl = document.createElement('div');
    lbl.className = 'inv-group-label'; lbl.textContent = '— current recipe —';
    list.appendChild(lbl); relevant.forEach(m => renderRow(m, true));
  }
  if (others.length) {
    const lbl = document.createElement('div');
    lbl.className = 'inv-group-label';
    lbl.textContent = relevant.length ? '— other materials —' : '— all materials —';
    list.appendChild(lbl); others.forEach(m => renderRow(m, false));
  }
  if (!relevant.length && !others.length)
    list.innerHTML = `<div style="padding:16px;color:var(--faint);font-size:.78rem">No materials found.</div>`;
  const ts = localStorage.getItem('gz_inv_ts');
  document.getElementById('invFooter').textContent = ts ? `Last saved: ${ts}` : 'Not saved yet';
}

// ── Import / Export ───────────────────────────────────────────────────────────
function doExport() {
  const ta = document.createElement('textarea');
  ta.style.cssText = 'position:fixed;opacity:0'; ta.value = JSON.stringify(INV, null, 2);
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta); alert('Inventory JSON copied to clipboard!');
}
function openImport() {
  document.getElementById('importTa').value = JSON.stringify(INV, null, 2);
  document.getElementById('importModal').classList.remove('hidden');
}
function closeImport() { document.getElementById('importModal').classList.add('hidden'); }
function doImport() {
  try {
    const parsed = JSON.parse(document.getElementById('importTa').value);
    if (typeof parsed !== 'object' || Array.isArray(parsed)) throw new Error('Expected object');
    INV = {};
    for (const [k, v] of Object.entries(parsed)) if (typeof v === 'number' && v > 0) INV[k] = v;
    saveInv(); renderInvList(document.getElementById('invSearch').value); recalc(); closeImport();
  } catch(e) { alert('Invalid JSON: ' + e.message); }
}
function clearInv() {
  if (!confirm('Clear all inventory data?')) return;
  INV = {}; saveInv(); renderInvList(document.getElementById('invSearch').value); recalc();
}

// ── Plans ─────────────────────────────────────────────────────────────────────
let PLANS = [];
let activePlanId = null;
let _pendingSave = null;

function loadPlansData() {
  try { PLANS = JSON.parse(localStorage.getItem('gz_plans') || '[]'); } catch { PLANS = []; }
}
function savePlansData() { localStorage.setItem('gz_plans', JSON.stringify(PLANS)); }

function openPlans() {
  document.getElementById('plansOverlay').classList.remove('hidden');
  renderPlansList();
}
function closePlans() {
  cancelSavePlan();
  document.getElementById('plansOverlay').classList.add('hidden');
}

function savePlan(fromPanel = false) {
  const item = document.getElementById('itemSelect').value;
  const qty  = Math.max(1, parseInt(document.getElementById('qty').value) || 1);
  if (!item) {
    const sel = document.getElementById('itemSelect');
    sel.style.borderBottomColor = 'var(--red)';
    setTimeout(() => sel.style.borderBottomColor = '', 1000);
    return;
  }
  _pendingSave = { item, qty };
  const inp = document.getElementById('planNameInput');
  inp.value = `${item} ×${qty}`;
  document.getElementById('planNewForm').classList.remove('hidden');
  openPlans();
  inp.focus(); inp.select();
}

function confirmSavePlan() {
  if (!_pendingSave) return;
  const inp  = document.getElementById('planNameInput');
  const name = inp.value.trim() || `${_pendingSave.item} ×${_pendingSave.qty}`;
  const plan = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
    name, item: _pendingSave.item, qty: _pendingSave.qty,
    savedAt: new Date().toLocaleString()
  };
  PLANS.push(plan);
  savePlansData();
  activePlanId = plan.id;
  _pendingSave = null;
  document.getElementById('planNewForm').classList.add('hidden');
  renderPlansList();
}

function cancelSavePlan() {
  _pendingSave = null;
  document.getElementById('planNewForm').classList.add('hidden');
}

function loadPlan(id) {
  const plan = PLANS.find(p => p.id === id);
  if (!plan) return;
  activePlanId = id;
  document.getElementById('categorySelect').value = 'all';
  populateItemSelect('all');
  const sel = document.getElementById('itemSelect');
  if ([...sel.options].some(o => o.value === plan.item)) sel.value = plan.item;
  document.getElementById('qty').value = plan.qty;
  recalc();
  closePlans();
}

function deletePlan(id) {
  PLANS = PLANS.filter(p => p.id !== id);
  if (activePlanId === id) activePlanId = null;
  savePlansData();
  renderPlansList();
}

function startRenamePlan(id, btn) {
  const item = btn.closest('.plan-item');
  const nameEl = item.querySelector('.plan-name');
  const inp = document.createElement('input');
  inp.className = 'plan-inline-input';
  inp.value = nameEl.textContent;
  inp.onkeydown = e => {
    if (e.key === 'Enter')  confirmRenamePlan(id, inp, nameEl);
    if (e.key === 'Escape') cancelRenamePlan(inp, nameEl);
  };
  inp.onblur = () => confirmRenamePlan(id, inp, nameEl);
  nameEl.replaceWith(inp);
  inp.focus(); inp.select();
}

function confirmRenamePlan(id, inp, nameEl) {
  if (!inp.isConnected) return;
  const plan = PLANS.find(p => p.id === id);
  const name = inp.value.trim();
  if (plan && name) { plan.name = name; savePlansData(); nameEl.textContent = name; }
  else nameEl.textContent = plan ? plan.name : inp.value;
  inp.replaceWith(nameEl);
}

function cancelRenamePlan(inp, nameEl) {
  if (!inp.isConnected) return;
  inp.replaceWith(nameEl);
}

function renderPlansList() {
  const list  = document.getElementById('plansList');
  const count = document.getElementById('plansCount');
  count.textContent = PLANS.length ? `${PLANS.length} plan${PLANS.length > 1 ? 's' : ''} saved` : '';
  if (!PLANS.length) {
    list.innerHTML = `<div class="plans-empty">No plans saved.<br>Select an item and click<br><em>+ Save Plan</em>.</div>`;
    return;
  }
  list.innerHTML = [...PLANS].reverse().map(p => {
    const isActive = p.id === activePlanId;
    return `<div class="plan-item ${isActive ? 'active' : ''}">
      <div class="plan-info" onclick="loadPlan('${p.id}')">
        <div class="plan-name">${p.name}</div>
        <div class="plan-meta">${p.savedAt}</div>
      </div>
      <button class="plan-edit" title="Rename" onclick="startRenamePlan('${p.id}',this)">✎</button>
      <button class="plan-del"  title="Delete" onclick="deletePlan('${p.id}')">✕</button>
    </div>`;
  }).join('');
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function setTheme(name) {
  document.documentElement.dataset.theme = name;
  localStorage.setItem('gz_theme', name);
  document.querySelectorAll('[data-theme-btn]').forEach(b => {
    b.classList.toggle('active', b.dataset.themeBtn === name);
  });
  requestAnimationFrame(drawConnectors);
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadInv();
loadPlansData();
buildSelector();
updateInvCount();
setTheme(localStorage.getItem('gz_theme') || 'nier');
window.addEventListener('resize', () => requestAnimationFrame(alignColumns));
</script>
